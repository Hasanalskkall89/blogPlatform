services:
  admin-dashboard:
    build: ./admin-dashboard
    container_name: blog-admin
    restart: always
    environment:
      NODE_ENV: production
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL}
      PORT: 3001
    ports:
      - "127.0.0.1:3001:3001"
    networks:
      - internal
    depends_on:
      - backend

  backend:
    build: ./backend
    container_name: blog-backend
    restart: always
    environment:
      NODE_ENV: production
      DATABASE_URL: ${DATABASE_URL}
      JWT_SECRET: ${JWT_SECRET}
      CORS_ORIGINS: ${CORS_ORIGINS}
      PORT: ${PORT}
    ports:
      - "127.0.0.1:5000:5000"
    volumes:
      - backend_uploads:/app/uploads
    networks:
      - internal
    depends_on:
      - database

  database:
    build: ./database
    container_name: blog-database
    restart: always
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    expose:
      - "5432"
    networks:
      - internal

  frontend:
    build: ./frontend
    container_name: blog-frontend
    restart: always
    environment:
      NODE_ENV: production
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL}
    ports:
      - "127.0.0.1:3000:3000"
    networks:
      - internal
    depends_on:
      - backend

volumes:
  postgres_data:
  backend_uploads:

networks:
  internal:
    driver: bridge
