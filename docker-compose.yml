version: '3.8'

services:
  nginx:
    build: ./nginx
    container_name: blog-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./certbot/www:/var/www/certbot:ro
      - ./certbot/conf:/etc/nginx/ssl:ro
    depends_on:
      - frontend
      - backend
      - admin-dashboard
    restart: always

  certbot:
    image: certbot/certbot:latest
    container_name: blog-certbot
    volumes:
      - ./certbot/conf:/etc/letsencrypt
      - ./certbot/www:/var/www/certbot
    command: certonly --webroot --webroot-path=/var/www/certbot --email ${SSL_EMAIL} --agree-tos --no-eff-email -d ${DOMAIN} -d www.${DOMAIN} -d ${ADMIN_DOMAIN} --force-renewal

  admin-dashboard:
    build: ./admin-dashboard
    container_name: blog-admin
    restart: always
    environment:
      NODE_ENV: production
      NEXT_PUBLIC_API_URL: https://${DOMAIN}/api
      PORT: ${ADMIN_PORT}
    expose:
      - "${ADMIN_PORT}"
    depends_on:
      - backend

  backend:
    build: ./backend
    container_name: blog-backend
    restart: always
    environment:
      NODE_ENV: production
      DATABASE_URL: postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@database:5432/${POSTGRES_DB}
      JWT_SECRET: ${JWT_SECRET}
      PORT: ${BACKEND_PORT}
    expose:
      - "${BACKEND_PORT}"
    depends_on:
      - database
    volumes:
      - backend_uploads:/app/uploads

  frontend:
    build: ./frontend
    container_name: blog-frontend
    restart: always
    environment:
      NODE_ENV: production
      NEXT_PUBLIC_API_URL: https://${DOMAIN}/api
      PORT: ${FRONTEND_PORT}
    expose:
      - "${FRONTEND_PORT}"
    depends_on:
      - backend

  database:
    image: postgres:15-alpine
    container_name: blog-db
    restart: always
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
  backend_uploads:
